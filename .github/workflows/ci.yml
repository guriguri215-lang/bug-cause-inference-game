name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run tests
        run: python -B -m pytest -q -p no:cacheprovider

      - name: Validate P1b real-diff artifacts
        run: python -m bug_cause_inference.p1b.real_diff --validate

  package-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build direct wheel and source distribution
        run: |
          python -m build --sdist --outdir tmp/release-direct
          python -m build --wheel --outdir tmp/release-direct

      - name: Rebuild wheel from source distribution
        run: |
          python -m pip wheel \
            --no-deps \
            --no-cache-dir \
            --wheel-dir tmp/release-from-sdist \
            tmp/release-direct/*.tar.gz

      - name: Validate artifact boundary and wheel parity
        run: |
          python scripts/check_release_artifacts.py \
            --wheel tmp/release-direct/*.whl \
            --sdist tmp/release-direct/*.tar.gz \
            --derived-wheel tmp/release-from-sdist/*.whl

      - name: Install direct and source-derived wheels
        run: |
          python -m venv tmp/release-direct-venv
          python -m venv tmp/release-derived-venv
          tmp/release-direct-venv/bin/python -m pip install \
            --no-deps tmp/release-direct/*.whl
          tmp/release-derived-venv/bin/python -m pip install \
            --no-deps tmp/release-from-sdist/*.whl

      - name: Smoke test installed distributions outside the repository
        run: |
          repository_root="$PWD"
          smoke_root="$RUNNER_TEMP/bug-cause-inference-package-smoke"
          mkdir -p "$smoke_root"
          cd "$smoke_root"
          "$repository_root/tmp/release-direct-venv/bin/bug-cause-inference" --help
          "$repository_root/tmp/release-direct-venv/bin/python" \
            -m bug_cause_inference.cli --help
          "$repository_root/tmp/release-direct-venv/bin/python" \
            -m bug_cause_inference.p1b.real_diff --validate
          "$repository_root/tmp/release-direct-venv/bin/python" \
            -m bug_cause_inference.cli p1d1-report --format json
          "$repository_root/tmp/release-derived-venv/bin/bug-cause-inference" --help
          "$repository_root/tmp/release-derived-venv/bin/python" \
            -m bug_cause_inference.cli --help
          "$repository_root/tmp/release-derived-venv/bin/python" \
            -m bug_cause_inference.p1b.real_diff --validate
